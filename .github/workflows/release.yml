name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger workflow khi có tag bắt đầu bằng v (ví dụ: v1.1.12)

permissions:
  contents: write # Cần thiết để GitHub Actions có thể tạo Release và upload file

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Phù hợp với phiên bản Electron/Node.js bạn đang sử dụng
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build & Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
